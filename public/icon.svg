<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bgGradient)"/>
  
  <!-- BEST text -->
  <text x="256" y="200" font-family="Arial, sans-serif" font-size="110" font-weight="bold" fill="white" text-anchor="middle">BEST</text>
  
  <!-- OLD text -->
  <text x="256" y="320" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="white" text-anchor="middle">OLD</text>
  
  <!-- Shopping bag icon -->
  <g transform="translate(256, 420)">
    <!-- Bag body -->
    <path d="M -60,-30 L -48,60 L 48,60 L 60,-30 Z" fill="none" stroke="white" stroke-width="12" stroke-linejoin="round"/>
    <!-- Bag handle -->
    <path d="M -30,-30 A 30,30 0 0,1 30,-30" fill="none" stroke="white" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
