    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Redirect www → non-www before React loads (fixes Google Search Console robots.txt fetch for www variant) -->
    <script>
      (function() {
        if (window.location.hostname.indexOf('www.') === 0) {
          var url = window.location.href.replace('www.', '');
          window.location.replace(url);
        }
      })();
    </script>

    <!--
      Capture beforeinstallprompt IMMEDIATELY before React mounts.
      This event often fires before the first React render, so an
      addEventListener inside useEffect would miss it on fast hosts like
      bestold.in. We park the event on window.__pwaInstallPrompt and
      also dispatch a custom event so already-mounted components can react.
    -->
    <script>
      (function() {
        window.__pwaInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', function(e) {
          e.preventDefault();
          window.__pwaInstallPrompt = e;
          window.dispatchEvent(new CustomEvent('pwa-installable'));
        });
        window.addEventListener('appinstalled', function() {
          window.__pwaInstallPrompt = null;
          window.dispatchEvent(new CustomEvent('pwa-installed'));
        });
      })();
    </script>
